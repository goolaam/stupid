<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ULTIMATE BRAIN ROT</title>
    <style>
        :root { --bg: #050505; --panel: #1a1a2e; --accent: #00f2ff; --fail: #ff0055; --win: #00ff88; }
        body { font-family: 'Comic Sans MS', cursive; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { background: var(--panel); width: 90%; max-width: 450px; padding: 25px; border-radius: 30px; border: 4px solid var(--accent); text-align: center; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); }
        #q-display { background: #000; padding: 20px; border-radius: 15px; margin-bottom: 20px; min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 15px; border: none; border-radius: 12px; background: #252545; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #353565; }
        .correct-glow { background: var(--win) !important; color: black; transform: scale(1.1); box-shadow: 0 0 20px var(--win); }
        .wrong-glow { background: var(--fail) !important; animation: shake 0.3s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .hidden { display: none !important; }
        #iq-num { font-size: 2rem; color: var(--accent); margin: 10px 0; }
        .stats { display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 20px; opacity: 0.7; }
    </style>
</head>
<body>

<div id="game-container">
    <div style="font-size: 0.7rem;">BRAIN PHASE: <span id="lvl-count">1</span>/50</div>
    <div id="iq-num">IQ: 150</div>
    
    <div id="quiz-box">
        <div id="q-display">Initializing...</div>
        <div class="grid" id="btn-grid">
            <button id="opt0" onclick="handle(0)"></button>
            <button id="opt1" onclick="handle(1)"></button>
            <button id="opt2" onclick="handle(2)"></button>
            <button id="opt3" onclick="handle(3)"></button>
        </div>
    </div>

    <div id="end-box" class="hidden">
        <h1>DIAGNOSIS COMPLETE</h1>
        <div id="final-iq" style="font-size: 3rem; color: var(--fail);">0</div>
        <p id="desc"></p>
        <button onclick="location.reload()" style="background: white; color: black;">REBOOT BRAIN</button>
    </div>

    <div class="stats">
        <span>CLEVER: <span id="c-score">0</span></span>
        <span>STUPID: <span id="s-score">0</span></span>
    </div>
</div>

<script>
    let cur = 0; let stupid = 0; let clever = 0; let iq = 150; let canClick = true;

    // 50 UNIQUE QUESTIONS
    const bank = [
        { q: "What is 1+1?", a: ["2", "11", "Window", "Math"], c: 2 },
        { q: "Click the GREEN button.", a: ["Blue", "Red", "Green", "Yellow"], c: 2 },
        { q: "How many letters in 'The Alphabet'?", a: ["26", "11", "8", "None"], c: 1 },
        { q: "Which animal says 'Moo'?", a: ["Cow", "Ghost", "Dog", "Your Mom"], c: 3 },
        { q: "Don't click the bottom left button.", a: ["This?", "That?", "Here?", "No?"], c: 1 },
        { q: "If you're in a race and pass 2nd place, you are in...", a: ["1st", "2nd", "3rd", "Last"], c: 1 },
        { q: "What do cows drink?", a: ["Milk", "Water", "Grass", "Coke"], c: 1 },
        { q: "Which is the largest?", a: ["Earth", "Jupiter", "The Sun", "Your Ego"], c: 3 },
        { q: "Press the button that is vibrating.", a: ["No", "No", "YES", "No"], c: 2 },
        { q: "How many months have 28 days?", a: ["1", "6", "12", "Depends"], c: 2 },
        { q: "Click the answer 'B'.", a: ["A", "C", "D", "B"], c: 3 },
        { q: "What is the capital of France?", a: ["Paris", "F", "London", "Bread"], c: 1 },
        { q: "Which of these is a fruit?", a: ["Pizza", "Tomato", "Rock", "Candle"], c: 1 },
        { q: "What is 0 divided by 0?", a: ["0", "1", "Infinity", "Don't"], c: 3 },
        { q: "Click the invisible button.", a: ["", "Visible", "Button", "Click"], c: 0 },
        { q: "Is the sky blue?", a: ["Yes", "No", "Sometimes", "At night?"], c: 3 },
        { q: "1, 2, 3, 4, ...", a: ["5", "6", "Potato", "99"], c: 2 },
        { q: "Wait for 3 seconds, then click choice 4.", a: ["Clicked!", "Wait", "Now?", "This one"], c: 3 },
        { q: "Which button is the impostor?", a: ["Button", "Button", "Butt0n", "Button"], c: 2 },
        { q: "Quick! 2 + 2?", a: ["4", "Fish", "22", "Baby"], c: 1 },
        { q: "What's the square root of an Onion?", a: ["Tears", "7", "Mashed", "Fry"], c: 0 },
        { q: "Click the word 'Blue' printed in Red.", a: ["Blue", "Red", "Green", "Pink"], c: 0 },
        { q: "Are you stupid?", a: ["No", "Yes", "Maybe", "I'm a cat"], c: 1 },
        { q: "Find the button that moves.", a: ["Stay", "Stop", "Catch me", "Wait"], c: 2 },
        { q: "Spell 'CABBAGE' backwards.", a: ["EGABBAC", "CABBAGE", "EGG", "NO"], c: 0 },
        { q: "Which is heavier?", a: ["1kg Lead", "1kg Feathers", "1kg Air", "The Burden of Life"], c: 3 },
        { q: "What comes after Z?", a: ["A", "Numbers", "Nothing", "The end"], c: 2 },
        { q: "Click the 3rd option.", a: ["1st", "2nd", "Wait", "3rd"], c: 2 },
        { q: "Can a match box?", a: ["No", "Yes", "Fire", "No, but a tin can"], c: 3 },
        { q: "What color is a Mirror?", a: ["Silver", "White", "Green", "Transparent"], c: 2 },
        { q: "Does 2+2=5?", a: ["Yes", "No", "On Tuesdays", "If you're bad at math"], c: 0 },
        { q: "How many letters in 'A DOG'?", a: ["3", "4", "2", "None"], c: 1 },
        { q: "Click the most annoying color.", a: ["Blue", "Gray", "Neon Pink", "Brown"], c: 2 },
        { q: "Where is the Moon?", a: ["Up", "Down", "Space", "Behind you"], c: 3 },
        { q: "If I have 3 apples and I give you 2, how many do YOU have?", a: ["1", "2", "3", "5"], c: 1 },
        { q: "Click the button that is NOT here.", a: ["This", "That", "Where?", "Error 404"], c: 3 },
        { q: "What is 9 + 10?", a: ["19", "21", "910", "A lot"], c: 1 },
        { q: "Press any key.", a: ["A", "Space", "The Button", "Any Key"], c: 3 },
        { q: "Which is the fastest?", a: ["Car", "Jet", "Light", "My dad leaving"], c: 3 },
        { q: "Is this question 40?", a: ["Yes", "No", "Maybe", "Level 40"], c: 0 },
        { q: "Click the 'OK' button.", a: ["Cancel", "Exit", "Abort", "OK"], c: 3 },
        { q: "What do you call a fly without wings?", a: ["A walk", "Disabled", "Bug", "Sad"], c: 0 },
        { q: "Is water wet?", a: ["Yes", "No", "Depends", "I'm thirsty"], c: 1 },
        { q: "Click the button that's upside down.", a: ["Up", "Down", "uʍoD", "Left"], c: 2 },
        { q: "How many legs does a spider have?", a: ["6", "8", "None", "Too many"], c: 3 },
        { q: "What is the last letter of the alphabet?", a: ["Z", "T", "Y", "A"], c: 1 },
        { q: "Pick the 'Right' answer.", a: ["Left", "Right", "Wrong", "Middle"], c: 1 },
        { q: "Are we there yet?", a: ["Yes", "No", "Almost", "Level 50?"], c: 1 },
        { q: "Ready for the end?", a: ["Yes", "No", "Wait", "Maybe"], c: 2 },
        { q: "2 + 2?", a: ["4", "Fish", "Window", "22"], c: 1 }
    ];

    function render() {
        if(cur >= bank.length) { finish(); return; }
        canClick = true;
        const d = bank[cur];
        document.getElementById('lvl-count').innerText = cur + 1;
        document.getElementById('q-display').innerText = d.q;
        
        for(let i=0; i<4; i++) {
            const b = document.getElementById(`opt${i}`);
            b.innerText = d.a[i];
            b.className = "";
            if(cur > 25) b.style.transform = `rotate(${Math.random()*10 - 5}deg)`;
        }
    }

    function handle(idx) {
        if(!canClick) return;
        canClick = false;
        const correct = bank[cur].c;

        if(idx === correct) {
            clever++;
            document.getElementById('c-score').innerText = clever;
            cur++; render();
        } else {
            stupid++;
            iq -= 3;
            document.getElementById('s-score').innerText = stupid;
            document.getElementById('iq-num').innerText = "IQ: " + iq;
            document.getElementById(`opt${idx}`).classList.add('wrong-glow');
            document.getElementById(`opt${correct}`).classList.add('correct-glow');
            setTimeout(() => { cur++; render(); }, 1200);
        }
    }

    function finish() {
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('end-box').classList.remove('hidden');
        document.getElementById('final-iq').innerText = iq;
        document.getElementById('desc').innerText = iq < 50 ? "You are a biological error." : "Barely sentient.";
    }

    render();
</script>
</body>
</html>
