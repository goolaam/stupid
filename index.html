<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE IQ DESTRUCTOR</title>
    <style>
        :root {
            --bg: #050510;
            --panel: #121225;
            --accent: #00ffcc;
            --fail: #ff0055;
            --success: #00ff44;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            background: var(--panel);
            width: 90%;
            max-width: 450px;
            padding: 25px;
            border: 4px solid var(--accent);
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2);
            transition: background 0.3s;
        }

        #iq-display {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--accent);
            margin: 10px 0;
            transition: transform 0.2s;
        }

        #q-area {
            background: #000;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border: 2px solid #333;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 18px 10px;
            border: none;
            border-radius: 15px;
            background: #252545;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            position: relative;
        }

        /* The "Right Answer" highlight */
        .reveal-right {
            background: var(--success) !important;
            color: black !important;
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--success);
            z-index: 10;
        }

        /* The "Wrong Choice" highlight */
        .reveal-wrong {
            background: var(--fail) !important;
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shrink-iq { transform: scale(0.5); color: var(--fail) !important; }

        .hidden { display: none !important; }
        .footer { margin-top: 25px; display: flex; justify-content: space-around; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div style="font-size: 0.8rem; opacity: 0.6;">STUPIDITY EXAM: LVL <span id="l-num">1</span>/50</div>
    <div id="iq-display">IQ: 150</div>

    <div id="play-zone">
        <div id="q-area">Preparing brain cells...</div>
        <div class="grid" id="btn-grid">
            <button id="b0">Option 1</button>
            <button id="b1">Option 2</button>
            <button id="b2">Option 3</button>
            <button id="b3">Option 4</button>
        </div>
    </div>

    <div id="end-zone" class="hidden">
        <h1 style="color: var(--fail);">RESULT</h1>
        <div id="final-perc" style="font-size: 3rem;">0% STUPID</div>
        <p id="commentary"></p>
        <button onclick="location.reload()" style="background: white; color: black; padding: 10px 20px;">RESET BRAIN</button>
    </div>

    <div class="footer">
        <span style="color: var(--success);">CLEVER: <span id="c-count">0</span></span>
        <span style="color: var(--fail);">STUPID: <span id="s-count">0</span></span>
    </div>
</div>

<script>
    let cur = 0;
    let stupid = 0;
    let clever = 0;
    let iq = 150;
    let acceptingInput = true;

    const questions = [
        { q: "What is 1+1?", a: ["2", "11", "Window", "Both A & C"], c: 3 },
        { q: "How many letters in 'The Alphabet'?", a: ["26", "11", "7", "None"], c: 1 },
        { q: "What do cows drink?", a: ["Milk", "Water", "Grass", "Soda"], c: 1 },
        { q: "Spell 'YEP' backwards.", a: ["PEY", "YEP", "EPY", "NO"], c: 0 },
        { q: "Which animal is a Fish?", a: ["Whale", "Shark", "Dolphin", "Submarine"], c: 1 },
        { q: "Click the answer 'B'.", a: ["A", "C", "D", "B"], c: 3 },
        { q: "What color is a Mirror?", a: ["Silver", "White", "Green", "Blue"], c: 2 },
        { q: "How many months have 28 days?", a: ["1", "2", "12", "None"], c: 2 },
        { q: "Click 'The Answer'.", a: ["Wrong", "The Answer", "Not this", "Actually No"], c: 1 },
        { q: "If 1=5, 2=25, 3=125, what does 5=?", a: ["625", "3125", "1", "5"], c: 3 },
        // ... (more questions added programmatically below)
    ];

    for(let i=11; i<=50; i++) {
        questions.push({
            q: `Level ${i}: Click the button that says '${i}'`,
            a: ["Nope", i.toString(), "Not here", "Wrong"],
            c: 1
        });
    }

    function render() {
        if(cur >= questions.length) {
            finish();
            return;
        }
        
        acceptingInput = true;
        const data = questions[cur];
        document.getElementById('l-num').innerText = cur + 1;
        document.getElementById('q-area').innerText = data.q;

        for(let i=0; i<4; i++) {
            const btn = document.getElementById(`b${i}`);
            btn.innerText = data.a[i];
            btn.className = ""; // Reset effects
            btn.onclick = () => check(i);
        }
    }

    function check(idx) {
        if(!acceptingInput) return;
        acceptingInput = false;

        const correctIdx = questions[cur].c;

        if(idx === correctIdx) {
            clever++;
            document.getElementById('c-count').innerText = clever;
            // Immediate next
            cur++;
            render();
        } else {
            stupid++;
            iq -= 4;
            document.getElementById('s-count').innerText = stupid;
            
            // Visual Shame Effect
            document.getElementById(`b${idx}`).classList.add('reveal-wrong');
            document.getElementById(`b${correctIdx}`).classList.add('reveal-right');
            
            // IQ Shrink effect
            const iqDisp = document.getElementById('iq-display');
            iqDisp.innerText = "IQ: " + iq;
            iqDisp.classList.add('shrink-iq');

            // Wait 1 second so they can see their mistake
            setTimeout(() => {
                iqDisp.classList.remove('shrink-iq');
                cur++;
                render();
            }, 1000);
        }
    }

    function finish() {
        document.getElementById('play-zone').classList.add('hidden');
        document.getElementById('end-zone').classList.remove('hidden');
        const score = Math.round((stupid / 50) * 100);
        document.getElementById('final-perc').innerText = score + "% STUPID";
        document.getElementById('commentary').innerText = score > 50 ? "Your brain is a smooth potato." : "Actually impressive.";
    }

    render();
</script>

</body>
</html>
